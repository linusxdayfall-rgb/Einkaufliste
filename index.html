<title>Einkaufs-Checkliste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEEE8;
    --card:#FBFAF5;
    --ink:#1B1B18;
    --indigo:#21487A;
    --indigo-deep:#173458;
    --indigo-soft:#9FB4CE;
    --persimmon:#DD5128;
    --stone:#8C8B7F;
    --line:#DCDAD0;
    --display:"M PLUS Rounded 1c", system-ui, sans-serif;
    --body:"Inter", system-ui, -apple-system, sans-serif;
    --mono:"SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--body);
    font-size:16px;
    line-height:1.4;
    padding-bottom:40px;
  }
  .wrap{max-width:560px;margin:0 auto;}
  .top{position:sticky;top:0;z-index:20;}

  /* Header */
  header{
    background:var(--indigo);
    color:var(--paper);
    padding:14px 18px 12px;
    padding-top:max(14px, env(safe-area-inset-top));
    box-shadow:0 2px 10px rgba(23,52,88,.18);
  }
  .h-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  h1{
    font-family:var(--display);font-weight:800;
    font-size:22px;letter-spacing:.2px;margin:0;color:var(--paper);
  }
  .sub{font-size:12.5px;color:var(--indigo-soft);margin-top:2px;letter-spacing:.2px;}
  .reset-all{
    appearance:none;border:1px solid rgba(255,255,255,.35);background:transparent;
    color:var(--paper);font-family:var(--body);font-size:12px;font-weight:500;
    padding:5px 10px;border-radius:999px;cursor:pointer;white-space:nowrap;flex:none;
  }
  .reset-all:active{background:rgba(255,255,255,.12);}
  .total{margin-top:11px;}
  .total-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--indigo-soft);margin-bottom:5px;}
  .total-meta b{color:var(--paper);font-weight:600;}
  .track{height:6px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;}
  .fill{height:100%;background:var(--paper);border-radius:999px;width:0;transition:width .35s ease;}

  /* Tabs */
  nav{
    background:var(--paper);
    border-bottom:1px solid var(--line);
    display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;
    padding:0 8px;
  }
  nav::-webkit-scrollbar{display:none;}
  .tab{
    appearance:none;background:transparent;border:none;cursor:pointer;
    font-family:var(--display);font-weight:700;font-size:14px;color:var(--stone);
    padding:13px 12px 11px;position:relative;white-space:nowrap;flex:none;
    display:flex;align-items:center;gap:6px;
  }
  .tab[aria-selected="true"]{color:var(--persimmon);}
  .tab[aria-selected="true"]::after{
    content:"";position:absolute;left:8px;right:8px;bottom:0;height:3px;
    background:var(--persimmon);border-radius:3px 3px 0 0;
  }
  .tab .dot{width:7px;height:7px;border-radius:50%;background:var(--indigo);opacity:0;transition:opacity .2s;}
  .tab.done .dot{opacity:1;}

  /* Panel */
  main{padding:16px 14px 0;}
  .panel-head{margin:4px 4px 14px;}
  .panel-title{font-family:var(--display);font-weight:800;font-size:19px;margin:0;}
  .panel-day{font-size:12.5px;color:var(--stone);margin-top:3px;letter-spacing:.2px;}
  .p-track{height:5px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:10px;}
  .p-fill{height:100%;background:var(--indigo);border-radius:999px;width:0;transition:width .35s ease;}
  .p-count{font-family:var(--mono);font-size:11.5px;color:var(--stone);margin-top:6px;display:block;}

  .list{list-style:none;margin:0;padding:0;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
  .item{
    width:100%;display:flex;align-items:center;gap:13px;
    background:transparent;border:none;border-bottom:1px solid var(--line);
    padding:14px 15px;cursor:pointer;text-align:left;font-family:var(--body);
    min-height:54px;color:var(--ink);transition:opacity .2s, background .12s;
  }
  .item:last-child{border-bottom:none;}
  .item:active{background:#F1EFE6;}
  .box{
    flex:none;width:25px;height:25px;border-radius:7px;
    border:2px solid var(--indigo);background:transparent;
    display:flex;align-items:center;justify-content:center;transition:transform .12s ease;
  }
  .box svg{width:15px;height:15px;opacity:0;transform:scale(.4);transition:opacity .15s, transform .18s cubic-bezier(.2,1.4,.4,1);}
  .name{flex:1;font-size:15.5px;font-weight:500;letter-spacing:.1px;}
  .qty{font-family:var(--mono);font-size:12.5px;color:var(--stone);white-space:nowrap;flex:none;}
  .item[aria-pressed="true"]{opacity:.5;}
  .item[aria-pressed="true"] .box{background:var(--persimmon);border-color:var(--persimmon);}
  .item[aria-pressed="true"] .box svg{opacity:1;transform:scale(1);}
  .item[aria-pressed="true"] .name{text-decoration:line-through;text-decoration-color:var(--stone);}
  .item:focus-visible{outline:3px solid var(--indigo-soft);outline-offset:-3px;}
  .tab:focus-visible,.reset-all:focus-visible,.clear:focus-visible{outline:3px solid var(--indigo-soft);outline-offset:2px;border-radius:8px;}

  .panel-foot{display:flex;justify-content:flex-end;padding:12px 4px 4px;}
  .clear{
    appearance:none;background:transparent;border:none;cursor:pointer;
    color:var(--persimmon);font-family:var(--body);font-size:13px;font-weight:600;padding:6px 4px;
  }
  .clear:active{opacity:.6;}
  .tip{font-size:12px;color:var(--stone);text-align:center;margin:22px 18px 0;line-height:1.5;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
  <header>
    <div class="h-row">
      <div>
        <h1>Einkaufs-Checkliste</h1>
        <div class="sub">2-Tage-Rhythmus &middot; Shiohama, Koto-ku</div>
      </div>
      <button class="reset-all" id="resetAll">Alles zurücksetzen</button>
    </div>
    <div class="total">
      <div class="total-meta"><span>Gesamt</span><span><b id="totDone">0</b> / <span id="totAll">0</span> erledigt</span></div>
      <div class="track"><div class="fill" id="totFill"></div></div>
    </div>
  </header>

  <nav id="tabs" role="tablist" aria-label="Einkäufe"></nav>
  </div>

  <main>
    <div class="panel-head">
      <h2 class="panel-title" id="pTitle"></h2>
      <div class="panel-day" id="pDay"></div>
      <div class="p-track"><div class="p-fill" id="pFill"></div></div>
      <span class="p-count" id="pCount"></span>
    </div>
    <ul class="list" id="list" role="tabpanel"></ul>
    <div class="panel-foot"><button class="clear" id="clearOne">Liste zurücksetzen</button></div>
  </main>

  <p class="tip">Tippe einen Eintrag an, um ihn abzuhaken. Die Liste merkt sich deinen Stand, solange sie geöffnet bleibt &ndash; ideal zum Wiederverwenden jede Woche.</p>
</div>

<script>
const CHECK = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#FBFAF5" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

const groups = [
  {id:'vorraete', tab:'Vorräte', name:'Grundvorräte', day:'einmalig · OK Store / Gyomu Super', items:[
    ['Reis','5-kg-Sack'],
    ['Haferflocken','1 Beutel'],
    ['Erdnussbutter','1 Glas'],
    ['Honig','1 Glas'],
    ['Ingwer & Knoblauch','je 1'],
    ['Sojasoße / Öl / Ketchup / Gewürze','Vorrat'],
  ]},
  {id:'modi', tab:'Mo–Di', name:'Einkauf 1 · Tag 1 & 2', day:'OK Store oder Ito-Yokado Kiba', items:[
    ['Eier','16 St.'],
    ['Milch','1 L'],
    ['Griechischer Joghurt','450 g'],
    ['Käse (Scheiben/Sticks)','1 Pack'],
    ['Natto','3er-Pack'],
    ['Hähnchenbrust','180 g'],
    ['Schweinefleisch (Komagire)','150 g'],
    ['Moyashi (Sojasprossen)','1 Beutel'],
    ['Kohl','½ Kopf'],
    ['Zwiebeln','3 St.'],
    ['Karotten','2 St.'],
    ['Bananen','3 St.'],
  ]},
  {id:'mido', tab:'Mi–Do', name:'Einkauf 2 · Tag 3 & 4', day:'My Basket Shiohama', items:[
    ['Hähnchenschenkel','250 g'],
    ['Hähnchen-Hackfleisch','150 g'],
    ['Tofu (fest)','1 Block'],
    ['Sojamilch','1 Packung'],
    ['Brot (Shokupan)','1 Pack'],
    ['Moyashi (Sojasprossen)','1 Beutel'],
    ['Bananen','2 St.'],
  ]},
  {id:'frsa', tab:'Fr–Sa', name:'Einkauf 3 · Tag 5 & 6', day:'My Basket Shiohama', items:[
    ['Schweinefleisch (Komagire)','150 g'],
    ['Hähnchen-Hackfleisch','100 g'],
    ['Tofu (fest)','1 Block'],
    ['Bananen','2 St.'],
  ]},
  {id:'so', tab:'So', name:'Einkauf 4 · Tag 7', day:'My Basket Shiohama', items:[
    ['Hähnchenbrust','180 g'],
    ['Brokkoli','1 Kopf'],
    ['Udon (TK)','1 Pack'],
  ]},
];

const SAVE_KEY = 'einkaufCheck:v1';
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){} }
function load(){ try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); if(s){ groups.forEach(g=>{ if(Array.isArray(s[g.id]) && s[g.id].length===g.items.length) state[g.id]=s[g.id].map(Boolean); }); } }catch(e){} }

const state = {};
groups.forEach(g => state[g.id] = g.items.map(() => false));
load();
let active = groups[0].id;

const tabsEl = document.getElementById('tabs');
const listEl = document.getElementById('list');

function groupDone(g){ return state[g.id].filter(Boolean).length; }
function totalAll(){ return groups.reduce((s,g)=>s+g.items.length,0); }
function totalDone(){ return groups.reduce((s,g)=>s+groupDone(g),0); }

function buildTabs(){
  tabsEl.innerHTML = '';
  groups.forEach(g => {
    const b = document.createElement('button');
    b.className = 'tab';
    b.setAttribute('role','tab');
    b.setAttribute('aria-selected', g.id===active ? 'true':'false');
    b.innerHTML = '<span>'+g.tab+'</span><span class="dot" aria-hidden="true"></span>';
    b.onclick = () => { active = g.id; renderAll(); };
    tabsEl.appendChild(b);
    g._tab = b;
  });
}

function renderTabs(){
  groups.forEach(g => {
    g._tab.setAttribute('aria-selected', g.id===active ? 'true':'false');
    const full = groupDone(g)===g.items.length && g.items.length>0;
    g._tab.classList.toggle('done', full);
  });
}

function renderList(){
  const g = groups.find(x => x.id===active);
  document.getElementById('pTitle').textContent = g.name;
  document.getElementById('pDay').textContent = g.day;
  const done = groupDone(g), all = g.items.length;
  document.getElementById('pFill').style.width = (all? done/all*100:0)+'%';
  document.getElementById('pCount').textContent = done+' / '+all;

  listEl.innerHTML = '';
  g.items.forEach((it, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'item';
    btn.type = 'button';
    btn.setAttribute('aria-pressed', state[g.id][i] ? 'true':'false');
    btn.innerHTML =
      '<span class="box" aria-hidden="true">'+CHECK+'</span>'+
      '<span class="name">'+it[0]+'</span>'+
      '<span class="qty">'+it[1]+'</span>';
    btn.onclick = () => { state[g.id][i] = !state[g.id][i]; renderAll(); };
    li.appendChild(btn);
    listEl.appendChild(li);
  });
}

function renderTotals(){
  const d = totalDone(), a = totalAll();
  document.getElementById('totDone').textContent = d;
  document.getElementById('totAll').textContent = a;
  document.getElementById('totFill').style.width = (a? d/a*100:0)+'%';
}

function renderAll(){ renderTabs(); renderList(); renderTotals(); save(); }

document.getElementById('clearOne').onclick = () => {
  state[active] = state[active].map(()=>false);
  renderAll();
};
document.getElementById('resetAll').onclick = () => {
  groups.forEach(g => state[g.id] = state[g.id].map(()=>false));
  renderAll();
};

buildTabs();
renderAll();
</script>
</body>
</html>
